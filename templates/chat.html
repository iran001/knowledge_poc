{% extends "base.html" %}

{% block title %}{{ page_title }} - {{ app_name }}{% endblock %}

{% block extra_css %}
<style>
    .chat-container {
        width: 100%;
        height: calc(100vh - 140px);
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .chat-iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
{% endblock %}

{% block content %}
<h2 class="page-title">💬 {{ page_title }}</h2>

<div class="chat-container">
    <iframe 
        class="chat-iframe" 
        src="{{ dify_chatbot_url }}"
        allow="microphone">
    </iframe>
</div>
{% endblock %}
