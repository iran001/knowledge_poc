{% extends "base.html" %}

{% block title %}{{ page_title }} - {{ app_name }}{% endblock %}

{% block extra_css %}
<style>
    .chat-wrapper {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 100px);
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        overflow: hidden;
    }

    .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid #e5e7eb;
        background: #fafafa;
    }

    .chat-header h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        color: #111827;
    }

    .chat-header .powered-by {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: #6b7280;
    }

    .chat-header .powered-by img {
        height: 18px;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: #f9fafb;
    }

    .message {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
        flex-direction: row-reverse;
    }

    .message-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
    }

    .message.bot .message-avatar {
        background: #1C64F2;
        color: white;
    }

    .message.user .message-avatar {
        background: #e5e7eb;
    }

    .message-content {
        max-width: 70%;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.6;
        word-wrap: break-word;
    }

    .message.bot .message-content {
        background: white;
        border: 1px solid #e5e7eb;
        color: #374151;
    }

    .message.user .message-content {
        background: #1C64F2;
        color: white;
    }

    .suggested-questions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
        padding-left: 48px;
    }

    .suggested-question {
        padding: 6px 12px;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        font-size: 13px;
        color: #374151;
        cursor: pointer;
        transition: all 0.2s;
    }

    .suggested-question:hover {
        background: #e5e7eb;
        border-color: #d1d5db;
    }

    .workflow-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px;
        background: #d1fae5;
        color: #065f46;
        font-size: 12px;
        border-radius: 4px;
        margin-bottom: 8px;
    }

    .chat-input-wrapper {
        padding: 16px 20px;
        border-top: 1px solid #e5e7eb;
        background: white;
    }

    .chat-input-container {
        display: flex;
        gap: 12px;
        align-items: center;
    }

    .chat-input {
        flex: 1;
        padding: 12px 16px;
        border: 1px solid #e5e7eb;
        border-radius: 24px;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
    }

    .chat-input:focus {
        border-color: #1C64F2;
    }

    .chat-input::placeholder {
        color: #9ca3af;
    }

    .chat-btn {
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 50%;
        background: #1C64F2;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
    }

    .chat-btn:hover {
        background: #1e40af;
    }

    .chat-btn:disabled {
        background: #9ca3af;
        cursor: not-allowed;
    }

    .chat-btn.mic {
        background: #f3f4f6;
        color: #6b7280;
    }

    .chat-btn.mic:hover {
        background: #e5e7eb;
    }

    .typing-indicator {
        display: flex;
        gap: 4px;
        padding: 12px 16px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        width: fit-content;
    }

    .typing-indicator span {
        width: 8px;
        height: 8px;
        background: #9ca3af;
        border-radius: 50%;
        animation: typing 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
    }

    @keyframes typing {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-10px); }
    }

    .welcome-message {
        text-align: center;
        padding: 40px 20px;
        color: #6b7280;
    }

    .welcome-message h3 {
        margin-bottom: 16px;
        color: #111827;
    }
</style>
{% endblock %}

{% block content %}
<div class="chat-wrapper">
    <div class="chat-header">
        <h2>💬 {{ page_title }}</h2>
        <div class="powered-by">
            POWERED BY
            <img src="https://img.shields.io/badge/Dify-1C64F2?style=flat-square&labelColor=white&logo=data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjQiIGhlaWdodD0iMjQiIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cGF0aCBkPSJNMTIgMkM2LjQ4IDIgMiA2LjQ4IDIgMTJTMiAyMiA2LjQ4IDIyIDEyIDIyIDEyIDEyIDYuNDggMiAxMiAyWiIgZmlsbD0iIzFDNjRGMiIvPjwvc3ZnPg==" alt="Dify">
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <!-- 欢迎消息 -->
        <div class="welcome-message" id="welcomeMessage">
            <h3>👋 您好！我是 IHG Pedia</h3>
            <p>有什么可以帮到你的吗？请告诉我你的问题，我可以进行问题回答。</p>
            <div class="suggested-questions">
                <span class="suggested-question" onclick="sendQuestion('会员招募流程')">会员招募流程</span>
                <span class="suggested-question" onclick="sendQuestion('会员转化率')">会员转化率</span>
                <span class="suggested-question" onclick="sendQuestion('介绍企微管家')">介绍企微管家</span>
                <span class="suggested-question" onclick="sendQuestion('IHG直销渠道支付宝支付优化方案')">IHG直销渠道支付宝支付优化方案</span>
            </div>
        </div>
    </div>

    <div class="chat-input-wrapper">
        <div class="chat-input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="和 百济知识库问答 聊天"
                   onkeypress="handleKeyPress(event)">
            <button class="chat-btn mic" title="语音输入">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
            </button>
            <button class="chat-btn" id="sendBtn" onclick="sendMessage()" title="发送">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    // Dify 配置
    const DIFY_CONFIG = {
        baseUrl: '{{ dify_config.base_url }}',
        apiKey: '{{ dify_config.api_key }}',
        endpoint: '{{ dify_config.chat_messages_endpoint }}'
    };

    // 角色输入变量
    const ROLE_INPUTS = {{ role_inputs | safe }};

    // 用户标识
    const USER_ID = '{{ user.username }}';
    let conversationId = '';
    let isTyping = false;

    // 发送预设问题
    function sendQuestion(question) {
        document.getElementById('chatInput').value = question;
        sendMessage();
    }

    // 处理回车键
    function handleKeyPress(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }

    // 发送消息
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();

        if (!message || isTyping) return;

        // 隐藏欢迎消息
        const welcomeMsg = document.getElementById('welcomeMessage');
        if (welcomeMsg) {
            welcomeMsg.style.display = 'none';
        }

        // 添加用户消息
        addMessage('user', message);
        input.value = '';

        // 显示输入中状态
        isTyping = true;
        const typingId = showTypingIndicator();

        try {
            // 调用 Dify API
            await callDifyAPI(message, typingId);
        } catch (error) {
            console.error('API Error:', error);
            removeTypingIndicator(typingId);
            addMessage('bot', '抱歉，服务暂时不可用，请稍后重试。');
            isTyping = false;
        }
    }

    // 调用 Dify API (流式响应)
    async function callDifyAPI(message, typingId) {
        const response = await fetch(DIFY_CONFIG.baseUrl + DIFY_CONFIG.endpoint, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${DIFY_CONFIG.apiKey}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                inputs: ROLE_INPUTS,
                query: message,
                response_mode: 'streaming',
                conversation_id: conversationId,
                user: USER_ID,
                files: []
            })
        });

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        // 移除输入中状态
        removeTypingIndicator(typingId);

        // 处理流式响应
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let botMessageId = null;
        let botMessageContent = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split('\n');

            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    try {
                        const data = JSON.parse(line.slice(6));
                        console.log('[Dify Event]', data.event, data);

                        switch (data.event) {
                            case 'workflow_started':
                                // 工作流开始
                                break;

                            case 'message':
                                // 收到消息片段
                                if (data.answer) {
                                    if (!botMessageId) {
                                        botMessageId = addMessage('bot', '');
                                    }
                                    botMessageContent += data.answer;
                                    updateMessage(botMessageId, botMessageContent);

                                    // 更新会话ID
                                    if (data.conversation_id) {
                                        conversationId = data.conversation_id;
                                    }
                                }
                                break;

                            case 'message_end':
                                // 消息结束
                                isTyping = false;
                                break;

                            case 'workflow_finished':
                                // 工作流结束
                                console.log('[Workflow] Finished:', data.data);
                                break;

                            case 'error':
                                // 错误
                                console.error('[Dify Error]', data);
                                if (botMessageId) {
                                    updateMessage(botMessageId, '抱歉，处理请求时发生错误。');
                                }
                                isTyping = false;
                                break;
                        }
                    } catch (e) {
                        console.error('Parse error:', e, line);
                    }
                }
            }
        }

        isTyping = false;
    }

    // 添加消息到界面
    function addMessage(type, content) {
        const messagesContainer = document.getElementById('chatMessages');
        const messageId = 'msg-' + Date.now();

        const messageHtml = `
            <div class="message ${type}" id="${messageId}">
                <div class="message-avatar">
                    ${type === 'bot' ? '🤖' : '👤'}
                </div>
                <div class="message-content">${escapeHtml(content)}</div>
            </div>
        `;

        messagesContainer.insertAdjacentHTML('beforeend', messageHtml);
        scrollToBottom();

        return messageId;
    }

    // 更新消息内容
    function updateMessage(messageId, content) {
        const messageEl = document.getElementById(messageId);
        if (messageEl) {
            const contentEl = messageEl.querySelector('.message-content');
            contentEl.innerHTML = escapeHtml(content);
            scrollToBottom();
        }
    }

    // 显示输入中状态
    function showTypingIndicator() {
        const messagesContainer = document.getElementById('chatMessages');
        const typingId = 'typing-' + Date.now();

        const typingHtml = `
            <div class="message bot" id="${typingId}">
                <div class="message-avatar">🤖</div>
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        `;

        messagesContainer.insertAdjacentHTML('beforeend', typingHtml);
        scrollToBottom();

        return typingId;
    }

    // 移除输入中状态
    function removeTypingIndicator(typingId) {
        const typingEl = document.getElementById(typingId);
        if (typingEl) {
            typingEl.remove();
        }
    }

    // 滚动到底部
    function scrollToBottom() {
        const messagesContainer = document.getElementById('chatMessages');
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // HTML 转义
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 页面加载完成后聚焦输入框
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('chatInput').focus();
    });
</script>
{% endblock %}
